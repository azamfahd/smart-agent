<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./app-icon.png">
    <title>الوكيل الذكي المتكامل - AI Agent Hub</title>
    
    <!-- External utilities (XLSX, HTML2PDF) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&family=Almarai:wght@300;400;700;800&family=Changa:wght@300;400;600;700&family=Lemonada:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-deep: #090e21;
            --glass-blur: 16px;
        }

        html, body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-x pan-y;
        }

        /* Ultimate Glass-Morphism With High Reflection & 3D Lighting Border */
        .glass-morphism {
            background: rgba(13, 20, 41, 0.55);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.25), 
                        inset 0 1px 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glass-morphism-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.04);
        }

        /* Realistic 3D Tilt, Lift, and Depth Elevations */
        .card-3d {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .card-3d:hover {
            transform: translate3d(0, -6px, 12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35), 
                        0 0 25px rgba(99, 102, 241, 0.15);
        }

        .card-3d-active {
            transform: translate3d(0, -6px, 20px);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.4), 
                        0 0 35px rgba(245, 158, 11, 0.25);
            border-color: rgba(245, 158, 11, 0.4) !important;
        }

        /* Professional Ambient Micro Glows and Neon Outlines */
        .neon-glow-indigo {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.35), inset 0 0 8px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4) !important;
        }

        .neon-glow-amber {
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.35), inset 0 0 8px rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.4) !important;
        }

        .neon-glow-emerald {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.35), inset 0 0 8px rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4) !important;
        }

        .neon-glow-purple {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.35), inset 0 0 8px rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4) !important;
        }

        .neon-glow-sky {
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.35), inset 0 0 8px rgba(14, 165, 233, 0.15);
            border-color: rgba(14, 165, 233, 0.4) !important;
        }

        /* Interactive Ambient Beams & Floating 3D Lights */
        @keyframes orbit-1 {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(50px, -60px) scale(1.15); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        @keyframes orbit-2 {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(-60px, 70px) scale(1.2); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        @keyframes orbit-3 {
            0% { transform: translate(0px, 0px) scale(1); }
            40% { transform: translate(70px, 50px) scale(0.85); }
            80% { transform: translate(-40px, -30px) scale(1.1); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        .animate-orbit-1 {
            animation: orbit-1 22s infinite alternate ease-in-out;
        }

        .animate-orbit-2 {
            animation: orbit-2 26s infinite alternate ease-in-out;
        }

        .animate-orbit-3 {
            animation: orbit-3 18s infinite alternate ease-in-out;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 12px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

        input, textarea { font-size: 16px !important; }
        
        .safe-area-inset {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Ambient glowing button active shine */
        .glowing-btn-wrap {
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        .glowing-btn-wrap::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: all 0.6s ease;
        }
        .glowing-btn-wrap:hover::after {
            left: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Unregistered active service worker for immediate update');
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) {
            caches.delete(name);
            console.log('Cleared service worker cache:', name);
          }
        });
      }
    </script>
</body>
</html>
